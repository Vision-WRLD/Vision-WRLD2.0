    <style>
      /* Page loader - disappears once React hydrates */
      #page-loader {
        position: fixed; inset: 0; z-index: 9999;
        background: #000;
        display: flex; align-items: center; justify-content: center;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      #page-loader.fade-out { opacity: 0; visibility: hidden; }
      #page-loader .spinner {
        width: 32px; height: 32px;
        border: 2px solid rgba(99,102,241,0.2);
        border-top-color: #818cf8;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!-- Page loader -->
    <div id="page-loader"><div class="spinner"></div></div>

    <!-- Skip to content (accessibility) -->
    <a href="#main-content"
       style="position:absolute;left:-9999px;top:0;z-index:10000;background:#6366f1;color:white;padding:8px 16px;font-size:14px;text-decoration:none;border-radius:0 0 8px 0;"
       onfocus="this.style.left='0'"
       onblur="this.style.left='-9999px'"
    >Skip to content</a>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
